name: Release Module Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          # Use manual input tag if workflow_dispatch, otherwise use release tag
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          # Remove 'v' prefix if present
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Update module.json
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          TAG=${{ steps.get_version.outputs.tag }}
          REPO=${{ github.repository }}
          jq --arg version "$VERSION" \
             --arg manifest "https://github.com/$REPO/releases/download/$TAG/module.json" \
             --arg download "https://github.com/$REPO/releases/download/$TAG/$VERSION.zip" \
             '.version = $version | .manifest = $manifest | .download = $download' \
             module.json > module.json.tmp && mv module.json.tmp module.json

      - name: Create module zip
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          zip -r "$VERSION.zip" . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.zip" \
            --exclude "packs/*/_source/*"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          TAG=${{ steps.get_version.outputs.tag }}
          gh release upload $TAG \
            module.json \
            "$VERSION.zip"